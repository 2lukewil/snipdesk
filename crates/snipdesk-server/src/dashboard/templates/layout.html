<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}} - {{BRAND_NAME}} admin</title>
  <link rel="stylesheet" href="/static/tokens.css" />
  <link rel="stylesheet" href="/static/scrollbars.css" />
  <link rel="stylesheet" href="/static/dashboard.css" />
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/idiomorph-ext.min.js" defer></script>
  <!-- Apply saved display prefs before paint: the accent option (Nebula
       vs the Aurora default) and the editor text size. -->
  <script>
    (function () {
      try {
        if (localStorage.getItem("snipdesk-dashboard-grad") === "nebula") {
          document.documentElement.dataset.grad = "nebula";
        }
        var sz = localStorage.getItem("snipdesk-dashboard-editor-size");
        if (sz === "sm" || sz === "lg") {
          document.documentElement.dataset.editorSize = sz;
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <nav class="nav">
    <span class="nav-brand"><button type="button" class="nav-glyph" id="brand-theme" title="Cycle accent theme" aria-label="Cycle accent theme">{{BRAND_INITIAL}}</button>{{BRAND_NAME}} admin</span>
    <span class="nav-links">
      <a href="/dashboard/users" class="{{USERS_ACTIVE}}">Users</a>
      <a href="/dashboard/library" class="{{LIBRARY_ACTIVE}}">Library</a>
      <a href="/dashboard/stats" class="{{STATS_ACTIVE}}">Stats</a>
      <a href="/dashboard/audit" class="{{AUDIT_ACTIVE}}">Audit</a>
    </span>
    <span class="nav-right">
      <span class="nav-user">{{NAV_USER}} <span class="pill role-{{NAV_ROLE}}">{{NAV_ROLE}}</span></span>
      <form method="post" action="/dashboard/logout" class="nav-form">
        <button type="submit" class="nav-signout" title="Sign out" aria-label="Sign out">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></svg>
        </button>
      </form>
    </span>
  </nav>
  <script>
    // Clicking the brand glyph cycles the accent theme (Aurora <-> Nebula),
    // persisted per browser.
    (function () {
      var glyph = document.getElementById("brand-theme");
      if (!glyph) return;
      glyph.addEventListener("click", function () {
        var nebula = document.documentElement.dataset.grad === "nebula";
        if (nebula) document.documentElement.removeAttribute("data-grad");
        else document.documentElement.dataset.grad = "nebula";
        try {
          localStorage.setItem("snipdesk-dashboard-grad", nebula ? "aurora" : "nebula");
        } catch (e) {}
      });
    })();
  </script>
  {{UPDATE_BANNER}}
  <main>
    {{CONTENT}}
  </main>
</body>
</html>
