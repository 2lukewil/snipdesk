<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Members can't access the dashboard — SnipDesk</title>
  <link rel="stylesheet" href="/static/dashboard.css" />
</head>
<body>
  <div class="login-card">
    <h1>Dashboard is admin-only</h1>
    <p class="sub">
      Your account is a member, not an admin. The dashboard manages users and
      shared library snippets — actions that only admins can take. Use the
      SnipDesk desktop client to access your personal snippets.
    </p>
    <form method="post" action="/dashboard/logout">
      <button type="submit">Sign out</button>
    </form>
  </div>
</body>
</html>
