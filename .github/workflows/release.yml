name: Release

# Triggered when you push a tag matching v* (e.g. v1.0.1, v2.0.0-rc1).
# The PR-validation workflow (ci.yml) doesn't run on tags, so this is the
# only thing that fires. Builds both flavors, signs them with the Ed25519
# key from secrets, generates manifests, publishes a GitHub release with
# all six files. Connected SnipDesk clients pick up the new version on
# their next launch poll.
#
# Prerequisites (one-time setup, see docs/auto-update.md):
#   - secrets.TAURI_SIGNING_PRIVATE_KEY: contents of ~/.snipdesk-update.key
#   - secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD: the passphrase you chose
#     when running `tauri signer generate`.
#   - tauri.conf.json's plugins.updater.pubkey filled in with the
#     contents of ~/.snipdesk-update.key.pub.
on:
  push:
    tags: ['v*']

# Required so softprops/action-gh-release can create the GitHub release.
permissions:
  contents: write

env:
  # Run bundled JavaScript actions (action-gh-release, rust-cache) on Node 24
  # instead of the deprecated Node 20 runtime. GitHub force-enables this in
  # June 2026; opting in now keeps runs warning-free and forward-compatible.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build, sign, publish
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      # rust-toolchain.toml is the single source of truth for the Rust
      # version + components; rustup auto-installs the pinned channel on
      # first use. `rustup show` triggers it as a fail-fast step. (No
      # dtolnay action: pairing it with a toml pin installs a conflicting
      # second toolchain - see ci.yml for the full rationale.)
      - name: Setup Rust toolchain (from rust-toolchain.toml)
        shell: pwsh
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          # Tag is "v1.0.1"; we want "1.0.1" for the manifest version field
          # and the release title.
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing version $version"

      # Guard against the tag-vs-config-mismatch auto-update loop. If
      # someone tags v1.0.2 without first bumping Cargo.toml (and the
      # other two version files), the resulting build has
      # CARGO_PKG_VERSION = (old) baked in but the manifest claims
      # (new). Tauri's updater plugin then compares installed=(old)
      # against manifest=(new), prompts "update available", installs
      # a binary that still reports (old), and loops forever on every
      # launch. This step fails the build before any binaries get
      # signed, so the operator catches the mistake immediately
      # instead of on a customer machine.
      - name: Verify tag matches all three version files
        shell: pwsh
        run: |
          $tagVersion = "${{ steps.version.outputs.VERSION }}"

          # src-tauri/Cargo.toml is the canonical CARGO_PKG_VERSION source -
          # this is what Tauri's bundler bakes into the running binary and
          # what the updater plugin compares against the manifest. The
          # root Cargo.toml has no [workspace.package] block (each crate
          # owns its own version), so we read this file directly.
          $cargoToml = Get-Content src-tauri/Cargo.toml -Raw
          if ($cargoToml -match '(?m)^version\s*=\s*"([^"]+)"') {
            $cargoVersion = $matches[1]
          } else {
            Write-Error "Couldn't find version in src-tauri/Cargo.toml"
            exit 1
          }
          if ($cargoVersion -ne $tagVersion) {
            Write-Error @"
          Tag v$tagVersion does not match src-tauri/Cargo.toml version = $cargoVersion.

          The desktop binary will embed CARGO_PKG_VERSION = $cargoVersion, but the
          updater manifest will claim version $tagVersion. Every running client
          compares installed=$cargoVersion against manifest=$tagVersion, prompts
          'update available' on every launch, installs a binary that still
          reports $cargoVersion, and loops forever.

          Fix: bump src-tauri/Cargo.toml, package.json, src-tauri/tauri.conf.json
          to $tagVersion, commit, then re-tag at the bump commit and push the
          tag again. The snipdesk-release skill does the whole bump-and-tag
          sequence in one shot.
          "@
            exit 1
          }

          $tauriConf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          if ($tauriConf.version -ne $tagVersion) {
            Write-Error "Tag v$tagVersion does not match src-tauri/tauri.conf.json version = $($tauriConf.version). Bump all three files and re-tag."
            exit 1
          }

          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          if ($pkg.version -ne $tagVersion) {
            Write-Error "Tag v$tagVersion does not match package.json version = $($pkg.version). Bump all three files and re-tag."
            exit 1
          }

          Write-Host "Tag v$tagVersion matches src-tauri/Cargo.toml + tauri.conf.json + package.json. Proceeding."

      - name: npm ci
        run: npm ci

      # ---- Offline build ----
      - name: Build offline frontend
        run: npm run build

      - name: Build offline NSIS bundle (signed)
        # Tauri's signer reads these env vars and produces .sig files
        # alongside the installers automatically. No separate signing step.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx @tauri-apps/cli build --bundles nsis

      # Normalize the Lite installer to a stable, version-less name (the Teams
      # build does its own rename in build-teams.mjs). Must run before the
      # Teams build so the two installers never collide in the nsis dir.
      - name: Normalize offline (Lite) installer name
        shell: pwsh
        run: |
          # Workspace target lives at the repo root, not under src-tauri/.
          $nsis = "target\release\bundle\nsis"
          $exe = Get-ChildItem $nsis -Filter "SnipDesk Lite_*_x64-setup.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "Offline NSIS installer not found in $nsis"; exit 1 }
          if (Test-Path "$($exe.FullName).sig") {
            Rename-Item "$($exe.FullName).sig" "SnipDesk-Lite-setup.exe.sig"
          }
          Rename-Item $exe.FullName "SnipDesk-Lite-setup.exe"
          Write-Host "Renamed $($exe.Name) -> SnipDesk-Lite-setup.exe"

      # ---- Teams build ----
      - name: Build Teams flavor (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build:teams -- --bundles nsis

      # ---- Vanilla manifest generation ----
      - name: Generate vanilla update manifests
        shell: pwsh
        run: |
          .\scripts\generate-manifest.ps1 `
            -Version "${{ steps.version.outputs.VERSION }}" `
            -Notes "Release ${{ steps.version.outputs.VERSION }}. See commit history for changes."

      # ---- Whitelabel build (optional) ----
      # When secrets.BRAND_CONFIG_WHITELABEL is set, build a second
      # pair of installers + manifests with the customer's brand
      # overrides applied via scripts/brand.mjs. The customer's
      # binary embeds its own updater_url pointing at the
      # whitelabel manifest file in this same release - so one
      # tag push services every audience and there's no extra
      # hosting required.
      # Brand bundle layout (built and base64-encoded by the
      # operator before pasting into secrets.BRAND_BUNDLE_WHITELABEL):
      #
      #   acme/
      #     brand.json
      #     icon.png
      #     installer-assets/
      #       header.bmp
      #       sidebar.bmp
      #       installer.ico
      #       license.rtf
      #
      # Produce the secret value on a workstation:
      #   node scripts/pack-brand.mjs brands/acme
      # The script writes <slug>-bundle.b64 to the OS temp dir and
      # prints the clipboard one-liner for your shell. Paste the
      # contents into the BRAND_BUNDLE_WHITELABEL secret.
      #
      # CI decodes the base64 into $RUNNER_TEMP/brand/ which
      # becomes the bundle root brand.mjs reads. Vanilla builds
      # are unaffected when the secret is absent.
      - name: Resolve whitelabel inputs
        id: wl
        shell: pwsh
        env:
          BRAND_BUNDLE_VALUE: ${{ secrets.BRAND_BUNDLE_WHITELABEL }}
        run: |
          $raw = $env:BRAND_BUNDLE_VALUE
          if (-not $raw) {
            Write-Host "No BRAND_BUNDLE_WHITELABEL secret; skipping whitelabel build."
            "configured=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
          $bundleDir = Join-Path $env:RUNNER_TEMP "brand"
          if (Test-Path $bundleDir) { Remove-Item $bundleDir -Recurse -Force }
          New-Item -ItemType Directory -Path $bundleDir | Out-Null
          $tgz = Join-Path $env:RUNNER_TEMP "brand.tgz"
          try {
            [IO.File]::WriteAllBytes($tgz, [Convert]::FromBase64String($raw.Trim()))
          } catch {
            Write-Error "BRAND_BUNDLE_WHITELABEL is not valid base64: $_"
            exit 1
          }
          tar -xzf $tgz -C $bundleDir
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to extract BRAND_BUNDLE_WHITELABEL tar."
            exit 1
          }
          $brandJson = Join-Path $bundleDir "brand.json"
          if (-not (Test-Path $brandJson)) {
            Write-Error "Bundle is missing brand.json at the root."
            exit 1
          }
          try { $cfg = Get-Content $brandJson -Raw | ConvertFrom-Json -ErrorAction Stop }
          catch { Write-Error "brand.json is not valid JSON: $_"; exit 1 }
          # `identifier` (the Lite bundle id) is no longer required:
          # the whitelabel pipeline only builds the Teams flavour.
          # `teams_identifier` is still required because we always
          # ship the Teams installer; `name` because every chrome
          # surface needs a display string.
          foreach ($key in 'name','teams_identifier') {
            if (-not $cfg.$key) { Write-Error "brand.json missing required field: $key"; exit 1 }
          }
          # PascalCase ASCII prefix for installer filenames; defaults
          # to name with non-alphanumerics stripped. Customers can
          # set "slug" explicitly for a shorter or different prefix.
          $installerPrefix = if ($cfg.slug) { $cfg.slug } else { ($cfg.name -replace '[^A-Za-z0-9]','') }
          # kebab-case prefix for the manifest filenames; always
          # rooted at "snipdesk-" so vanilla and whitelabel coexist
          # cleanly in releases/latest/download/.
          $slugLower = if ($cfg.slug) { $cfg.slug.ToLower() } else { ($cfg.name -replace '[^A-Za-z0-9]','').ToLower() }
          "configured=true" >> $env:GITHUB_OUTPUT
          "config_path=$brandJson" >> $env:GITHUB_OUTPUT
          "product_name=$($cfg.name)" >> $env:GITHUB_OUTPUT
          "installer_prefix=$installerPrefix" >> $env:GITHUB_OUTPUT
          "manifest_prefix=snipdesk-$slugLower" >> $env:GITHUB_OUTPUT
          $hasAssets = Test-Path (Join-Path $bundleDir "installer-assets")
          Write-Host "Whitelabel configured: $($cfg.name) -> installer prefix '$installerPrefix', manifest prefix 'snipdesk-$slugLower'"
          Write-Host ("Installer-assets present in bundle: " + $(if ($hasAssets) { 'yes' } else { 'no' }))

      # Whitelabel is Teams-only by design: a customer deployment
      # always pairs the desktop client with a snipdesk-server, so
      # the Lite (free, no-server) flavour doesn't have a customer
      # audience. Skipping the Lite build saves ~5 minutes of CI
      # per release and keeps the asset list short.
      - name: Build whitelabel Teams (signed)
        if: steps.wl.outputs.configured == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          BRAND_CONFIG: ${{ steps.wl.outputs.config_path }}
        run: npm run tauri:build:teams -- --bundles nsis

      - name: Generate whitelabel Teams manifest
        if: steps.wl.outputs.configured == 'true'
        shell: pwsh
        run: |
          .\scripts\generate-manifest.ps1 -TeamsOnly `
            -Version "${{ steps.version.outputs.VERSION }}" `
            -Notes "Release ${{ steps.version.outputs.VERSION }}. See commit history for changes." `
            -InstallerPrefix "${{ steps.wl.outputs.installer_prefix }}" `
            -ManifestPrefix "${{ steps.wl.outputs.manifest_prefix }}"

      # ---- Sanity check before publishing ----
      - name: Verify all release artifacts exist
        shell: pwsh
        env:
          WL_CONFIGURED: ${{ steps.wl.outputs.configured }}
          WL_INSTALLER_PREFIX: ${{ steps.wl.outputs.installer_prefix }}
          WL_MANIFEST_PREFIX: ${{ steps.wl.outputs.manifest_prefix }}
        run: |
          $expected = @(
            "target\release\bundle\nsis\SnipDesk-Lite-setup.exe",
            "target\release\bundle\nsis\SnipDesk-Lite-setup.exe.sig",
            "target\release\bundle\nsis\SnipDesk-Teams-setup.exe",
            "target\release\bundle\nsis\SnipDesk-Teams-setup.exe.sig",
            "snipdesk-update.json",
            "snipdesk-teams-update.json"
          )
          if ($env:WL_CONFIGURED -eq 'true') {
            # Whitelabel ships Teams only - see the build section
            # above for the rationale.
            $expected += @(
              "target\release\bundle\nsis\$($env:WL_INSTALLER_PREFIX)-Teams-setup.exe",
              "target\release\bundle\nsis\$($env:WL_INSTALLER_PREFIX)-Teams-setup.exe.sig",
              "$($env:WL_MANIFEST_PREFIX)-teams-update.json"
            )
          }
          $missing = $expected | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Error "Missing release artifacts: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All $($expected.Count) artifacts present."

      # ---- Publish release ----
      #
      # Two conditional steps instead of one with a dynamically-
      # composed `files:` input. The earlier approach assembled a
      # multi-line GITHUB_OUTPUT value via PowerShell heredoc, which
      # sporadically lost its contents because Out-File's trailing
      # CRLF doesn't match the LF the GHA heredoc parser expects -
      # result was an empty `files:` and a release with zero
      # attachments. Inline YAML blocks dodge the PowerShell
      # middleman entirely and GitHub's `${{ }}` interpolation
      # handles the whitelabel paths natively. Only one of the two
      # steps fires per run; softprops/action-gh-release is
      # idempotent on tag_name so even if both ran the release row
      # would resolve cleanly.
      - name: Create GitHub release (vanilla only)
        if: steps.wl.outputs.configured != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SnipDesk ${{ steps.version.outputs.VERSION }}
          # Auto-generates from PRs/commits since previous tag.
          generate_release_notes: true
          # Default is to mark this as Latest; the updater's URL pattern
          # (releases/latest/download/...) follows that redirect, so this
          # is what makes connected clients pick up the new version.
          make_latest: 'true'
          fail_on_unmatched_files: true
          files: |
            target/release/bundle/nsis/SnipDesk-Lite-setup.exe
            target/release/bundle/nsis/SnipDesk-Lite-setup.exe.sig
            target/release/bundle/nsis/SnipDesk-Teams-setup.exe
            target/release/bundle/nsis/SnipDesk-Teams-setup.exe.sig
            snipdesk-update.json
            snipdesk-teams-update.json

      - name: Create GitHub release (vanilla + whitelabel)
        if: steps.wl.outputs.configured == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SnipDesk ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          make_latest: 'true'
          fail_on_unmatched_files: true
          files: |
            target/release/bundle/nsis/SnipDesk-Lite-setup.exe
            target/release/bundle/nsis/SnipDesk-Lite-setup.exe.sig
            target/release/bundle/nsis/SnipDesk-Teams-setup.exe
            target/release/bundle/nsis/SnipDesk-Teams-setup.exe.sig
            snipdesk-update.json
            snipdesk-teams-update.json
            target/release/bundle/nsis/${{ steps.wl.outputs.installer_prefix }}-Teams-setup.exe
            target/release/bundle/nsis/${{ steps.wl.outputs.installer_prefix }}-Teams-setup.exe.sig
            ${{ steps.wl.outputs.manifest_prefix }}-teams-update.json
