<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in - {{BRAND_NAME}} admin</title>
  <link rel="stylesheet" href="/static/dashboard.css" />
</head>
<body>
  <div class="login-card">
    <h1>{{BRAND_NAME}} admin</h1>
    <p class="sub">Sign in with your {{BRAND_NAME}} Teams account. Members can use the desktop client; this dashboard is admin-only.</p>
    {{BANNER}}
    <form method="post" action="/dashboard/login" class="stack">
      <input type="hidden" name="redirect_to" value="{{REDIRECT_TO}}" />
      <label>Email
        <input type="email" name="email" autocomplete="username" required autofocus />
      </label>
      <label>Password
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <button type="submit" class="primary">Sign in</button>
    </form>
    {{SSO_BUTTONS}}
  </div>
</body>
</html>
