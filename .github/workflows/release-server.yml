name: Release snipdesk-server

# Triggered when you push a tag matching server-v* (e.g. server-v0.1.0).
# Builds the Docker image, publishes to GitHub Container Registry, and
# attaches a GitHub release with deploy notes. Desktop releases use the
# separate v* tag scheme (release.yml); the two pipelines are
# intentionally independent because the cadences will diverge.

on:
  push:
    tags: ['server-v*']

permissions:
  contents: write       # for creating the GitHub release
  packages: write       # for pushing to ghcr.io

env:
  # See release.yml for the rationale on opting Node-based actions to Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/snipdesk-server

jobs:
  build:
    name: Build + push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          # server-v0.1.0 -> 0.1.0
          version="${GITHUB_REF_NAME#server-v}"
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing snipdesk-server $version"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Buildx layer cache for repeat builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: snipdesk-server ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          body: |
            Docker image published:

                docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}

            See `docs/server-design.md` for the deployment guide.
