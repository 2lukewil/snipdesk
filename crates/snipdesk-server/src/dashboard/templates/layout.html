<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}} - {{BRAND_NAME}} admin</title>
  <link rel="stylesheet" href="/static/tokens.css" />
  <link rel="stylesheet" href="/static/scrollbars.css" />
  <link rel="stylesheet" href="/static/dashboard.css" />
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/idiomorph-ext.min.js" defer></script>
  <!-- Apply saved display prefs before paint: the accent option (Nebula
       vs the Aurora default) and the editor text size. -->
  <script>
    (function () {
      try {
        if (localStorage.getItem("snipdesk-dashboard-grad") === "nebula") {
          document.documentElement.dataset.grad = "nebula";
        }
        var sz = localStorage.getItem("snipdesk-dashboard-editor-size");
        if (sz === "sm" || sz === "lg") {
          document.documentElement.dataset.editorSize = sz;
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <nav class="nav">
    <span class="nav-brand"><span class="nav-glyph" aria-hidden="true">{{BRAND_INITIAL}}</span>{{BRAND_NAME}} admin</span>
    <span class="nav-links">
      <a href="/dashboard/users" class="{{USERS_ACTIVE}}">Users</a>
      <a href="/dashboard/library" class="{{LIBRARY_ACTIVE}}">Library</a>
      <a href="/dashboard/library/insights" class="{{INSIGHTS_ACTIVE}}">Insights</a>
      <a href="/dashboard/stats" class="{{STATS_ACTIVE}}">Stats</a>
      <a href="/dashboard/onboarding" class="{{ONBOARDING_ACTIVE}}">Onboarding</a>
      <a href="/dashboard/audit" class="{{AUDIT_ACTIVE}}">Audit</a>
    </span>
    <span class="nav-right">
      <label class="nav-appearance" title="Accent theme">
        <span class="sr-only">Accent theme</span>
        <select id="grad-select" aria-label="Accent theme">
          <option value="aurora">Aurora</option>
          <option value="nebula">Nebula</option>
        </select>
      </label>
      <label class="nav-appearance" title="Editor text size">
        <span class="sr-only">Editor text size</span>
        <select id="editor-size-select" aria-label="Editor text size">
          <option value="sm">Text: S</option>
          <option value="md">Text: M</option>
          <option value="lg">Text: L</option>
        </select>
      </label>
      <span class="nav-user">{{NAV_USER}} <span class="pill role-{{NAV_ROLE}}">{{NAV_ROLE}}</span></span>
      <form method="post" action="/dashboard/logout" class="nav-form">
        <button type="submit" class="ghost">Sign out</button>
      </form>
    </span>
  </nav>
  <script>
    (function () {
      var sel = document.getElementById("grad-select");
      if (!sel) return;
      sel.value = document.documentElement.dataset.grad === "nebula" ? "nebula" : "aurora";
      sel.addEventListener("change", function () {
        var v = sel.value === "nebula" ? "nebula" : "aurora";
        if (v === "nebula") document.documentElement.dataset.grad = "nebula";
        else document.documentElement.removeAttribute("data-grad");
        try { localStorage.setItem("snipdesk-dashboard-grad", v); } catch (e) {}
      });

      var size = document.getElementById("editor-size-select");
      if (size) {
        size.value = document.documentElement.dataset.editorSize || "md";
        size.addEventListener("change", function () {
          var v = size.value;
          if (v === "sm" || v === "lg") document.documentElement.dataset.editorSize = v;
          else document.documentElement.removeAttribute("data-editor-size");
          try { localStorage.setItem("snipdesk-dashboard-editor-size", v); } catch (e) {}
        });
      }
    })();
  </script>
  {{UPDATE_BANNER}}
  <main>
    {{CONTENT}}
  </main>
</body>
</html>
