<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnipDesk Manager</title>
    <link rel="stylesheet" href="./manager.css" />
  </head>
  <body>
    <header>
      <span class="brand">SnipDesk</span>
      <nav id="tabs" class="hidden">
        <button data-tab="snippets" class="active">Snippets</button>
        <button data-tab="settings">Settings</button>
        <button data-tab="trash">Trash</button>
      </nav>
      <span class="spacer"></span>
      <span id="sync-indicator" class="sync-indicator"></span>
      <span id="identity" class="identity"></span>
      <button id="btn-logout" class="ghost hidden">Sign out</button>
    </header>

    <main>
      <div id="signed-out" class="notice hidden">
        Sign in from the SnipDesk toolbar icon, then reload this page.
      </div>

      <!-- Snippets tab -->
      <section id="tab-snippets" class="tab hidden">
        <div class="toolbar">
          <input id="search" type="search" placeholder="Search snippets..." autocomplete="off" />
          <button id="btn-new" class="primary">New snippet</button>
          <button id="btn-export" class="ghost" title="Export your personal snippets to a file">Export</button>
          <button id="btn-import" class="ghost" title="Import snippets from a file">Import</button>
          <input id="import-file" type="file" accept="application/json,.json" hidden />
          <button id="btn-dashboard" class="ghost hidden" title="Team library is managed in the dashboard">Team library...</button>
        </div>
        <div id="tag-strip" class="tag-strip hidden"></div>
        <div class="three-pane">
          <div class="pane tree-pane">
            <form id="folder-create" class="folder-create" autocomplete="off">
              <input id="folder-create-input" type="text" placeholder="New folder..." spellcheck="false" />
              <button type="submit" class="primary" title="Create folder">+</button>
            </form>
            <div id="tree" class="tree"></div>
          </div>
          <div id="list" class="pane list"></div>
          <div id="editor" class="editor">
            <p class="placeholder">Select a snippet, or create a new one.</p>
          </div>
        </div>
      </section>

      <!-- Settings tab -->
      <section id="tab-settings" class="tab hidden">
        <h2>Savings estimate</h2>
        <label class="check"><input type="checkbox" id="set-show-savings" /> Show time/money saved</label>
        <label>Typing speed (WPM)<input type="number" id="set-wpm" min="1" max="500" /></label>
        <label>Hourly wage (0 to hide money)<input type="number" id="set-wage" min="0" step="0.01" /></label>
        <label>Currency symbol<input type="text" id="set-currency" maxlength="8" /></label>
        <h2>Display</h2>
        <label>Theme
          <select id="set-theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>
        <label class="check"><input type="checkbox" id="set-sort-usage" /> Sort by most used (otherwise alphabetical)</label>
        <label class="check"><input type="checkbox" id="set-usage-count" /> Show usage counts</label>
        <label class="check"><input type="checkbox" id="set-compact" /> Compact density</label>
        <div class="actions"><button id="btn-save-settings" class="primary">Save settings</button></div>
        <div id="settings-status" class="status"></div>

        <h2>Keyboard shortcut</h2>
        <p class="muted">Open the launcher on any page with your shortcut (default Ctrl+Shift+Space). Rebind it on Chrome's shortcuts page.</p>
        <div class="actions"><button id="btn-shortcut" class="ghost">Change shortcut</button></div>
      </section>

      <!-- Trash tab -->
      <section id="tab-trash" class="tab hidden">
        <div class="trash-toolbar">
          <input id="trash-search" type="search" placeholder="Search trash..." autocomplete="off" />
        </div>
        <div id="trash-list"></div>
      </section>
    </main>

    <script type="module" src="./manager.js"></script>
  </body>
</html>
