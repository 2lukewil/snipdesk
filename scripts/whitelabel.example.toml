# White-label config example. Lives OUTSIDE this repo (sibling
# directory or a private repo of your own). Pass its absolute path
# in via $WHITELABEL_CONFIG when building:
#
#   WHITELABEL_CONFIG=/path/to/acme/whitelabel.toml npm run tauri:build
#
# Anything missing falls back to the stock "SnipDesk" defaults; the
# script's missing-config path produces an unbranded build, so a
# fresh clone always builds without setup.

[brand]
# Display name shown in window title, tray menu, About panel, and
# notification sources. Used as the productName for the Lite build
# ("<name> Lite") and as the Teams productName as-is.
name = "Acme Snippets"

# Short form for places where space is tight (toast titles, tray
# tooltip). Defaults to brand.name when omitted.
short_name = "Acme"

# Bundle identifier. Must be a reverse-DNS string the OS treats as
# unique to your build. Lite + Teams use distinct ids so both can be
# installed side-by-side.
identifier = "com.acme.snippets"
teams_identifier = "com.acme.snippets.teams"

# Optional long-form blurb embedded in installer metadata.
# long_description = "Acme Snippets: branded snippet launcher."

[server]
# When set, the desktop client skips the "type your server URL"
# prompt and uses this URL on first sign-in. The settings field is
# rendered read-only so end users can't repoint it.
# baked_url = "https://snippets.acme.com"

# When true, the sign-in flow hides email/password and only offers
# the configured SSO button (currently Google). Use this when your
# deployment forbids local accounts.
# sso_only = true

[updater]
# Per-customer auto-update endpoints. Optional. When unset, falls
# back to the stock SnipDesk release feed - which is almost
# certainly not what you want for a customer build, but won't break
# anything.
# endpoint       = "https://updates.acme.com/lite/{{target}}/{{current_version}}"
# teams_endpoint = "https://updates.acme.com/teams/{{target}}/{{current_version}}"
