# Example config for snipdesk-server. Copy to a real location
# (e.g. /etc/snipdesk/config.toml in Docker, or alongside the binary
# locally) and edit the values. Never commit a config with a real
# master_key or jwt_secret.

# Address the HTTP server binds to. 0.0.0.0 listens on all interfaces.
bind_addr = "0.0.0.0:8080"

# Directory where the SQLite DB and any future state files live. Created
# on first run if missing.
data_dir = "./data"

# (Reserved for the auth phase) JWT signing secret. Generate with:
#   openssl rand -hex 32
# Leave blank until auth lands.
jwt_secret = ""

# Origins allowed to make cross-origin requests to /api/*. Empty
# (default) = same-origin only; no CORS layer mounted. Populate when
# a separate web frontend needs to talk to the API. Each entry must
# include scheme + (if non-default) port.
#
# cors_allowed_origins = ["https://app.example.com", "http://localhost:5173"]

# Dashboard stats-page knobs. Optional; the defaults estimate using
# 80 wpm at AUD $25/hr. Per-user wpm/wage/currency overrides set via
# PATCH /api/me (from the desktop Settings panel) take precedence
# over these server-wide defaults. The dashboard normalises money to
# AUD using the rates below; the currency dropdown on the stats page
# converts the displayed value to any code in the table.
#
# [stats]
# wpm = 80
# hourly_wage = 25.0
# currency = "AUD"
# [stats.aud_rates]
# AUD = 1.0
# USD = 1.50
# EUR = 1.65

# Optional live FX feed. When this block is present, the server
# fetches current rates from a free no-auth provider on boot and
# every `cache_ttl_hours` thereafter, overlaying the static
# `[stats.aud_rates]` table with fresh numbers. Falls back to the
# static table on fetch failure, so the dashboard never breaks if
# the provider is down. Leave commented to keep the server fully
# offline-capable.
#
# Supported providers:
#   - "open.er-api.com" (default; USD-base, daily-updated, free)
#   - any URL starting with "http(s)://" returning the same response
#     shape, for self-hosted proxies and tests
#
# [fx]
# provider = "open.er-api.com"
# cache_ttl_hours = 24

[crypto]
# Master encryption key for personal-snippet payloads. In priority order:
#   1. SNIPDESK_MASTER_KEY env var (preferred for containers).
#   2. master_key_file = "/path/to/file" (file content is the base64 key).
#   3. master_key = "<base64>" (dev convenience only).
#
# Generate a fresh key with:
#   snipdesk-server gen-key
master_key = ""
# master_key_file = "/run/secrets/snipdesk-master-key"

# Optional: "Sign in with Google" via OIDC. Uncomment the section and
# fill in the values from your Google Cloud Console OAuth client to
# enable the desktop "Sign in with Google" button. Without this section
# the OIDC endpoints return a clean "not configured" error and the
# desktop stays on password sign-in.
#
# [oidc.google]
# client_id = "123456789012-abcdef.apps.googleusercontent.com"
# client_secret = "GOCSPX-replace-me"
# # The full URL Google will redirect to. Must EXACTLY match an
# # Authorized Redirect URI registered in the GCP console.
# redirect_uri = "https://snipdesk.yourcompany.com/api/auth/oidc/callback"
# # Strict Workspace lock: only accept tokens whose hd claim matches.
# # Comment out for "any Google account" mode (the consent screen still
# # gates who reaches sign-in, depending on External vs Internal app
# # type in GCP).
# required_hd = "yourcompany.com"
# # Softer fallback: allow any email whose domain matches one of these.
# allowed_email_domains = ["yourcompany.com"]

# Brand label shown in the dashboard chrome (browser title, nav
# header, login card, member-blocked page). Optional; defaults to
# "SnipDesk" so an existing deployment keeps its stock name when
# this block isn't set. Useful when the server backs a redeployment
# that uses a different product name.
#
# [brand]
# name = "Acme Snippets"

# Periodic check for newer server releases. Default on; polls the
# upstream GitHub releases feed every 6 hours, compares the highest
# `server-v*` tag against the running version, and surfaces a
# banner on the dashboard + an info log when a newer one exists.
# Notification-only: the binary is never rewritten in place.
# Container rollouts happen via image pulls; bare-metal operators
# swap binaries during their maintenance window.
#
# [updater]
# enabled = true
# check_interval_hours = 6
# # Override the feed for an air-gapped mirror or a fork:
# # release_feed_url = "https://api.github.com/repos/yourorg/snipdesk/releases?per_page=20"
# # tag_prefix = "server-v"
# # Optional token to raise the GitHub API rate limit from 60/hr to
# # 5000/hr; only needed if many instances share an outbound IP.
# # github_token = "ghp_..."
