# Example config for snipdesk-server. Copy to a real location
# (e.g. /etc/snipdesk/config.toml in Docker, or alongside the binary
# locally) and edit the values. Never commit a config with a real
# master_key or jwt_secret.

# Address the HTTP server binds to. 0.0.0.0 listens on all interfaces.
bind_addr = "0.0.0.0:8080"

# Directory where the SQLite DB and any future state files live. Created
# on first run if missing.
data_dir = "./data"

# (Reserved for the auth phase) JWT signing secret. Generate with:
#   openssl rand -hex 32
# Leave blank until auth lands.
jwt_secret = ""

# Dashboard stats-page knobs. Optional; the defaults estimate using
# 80 wpm at AUD $25/hr. The dashboard normalises money to AUD using
# the rates below; override these (or just set `currency = "AUD"` and
# `hourly_wage` directly) when your team thinks in different money.
#
# [stats]
# wpm = 80
# hourly_wage = 25.0
# currency = "AUD"
# [stats.aud_rates]
# AUD = 1.0
# USD = 1.50
# EUR = 1.65

[crypto]
# Master encryption key for personal-snippet payloads. In priority order:
#   1. SNIPDESK_MASTER_KEY env var (preferred for containers).
#   2. master_key_file = "/path/to/file" (file content is the base64 key).
#   3. master_key = "<base64>" (dev convenience only).
#
# Generate a fresh key with:
#   snipdesk-server gen-key
master_key = ""
# master_key_file = "/run/secrets/snipdesk-master-key"

# Optional: "Sign in with Google" via OIDC. Uncomment the section and
# fill in the values from your Google Cloud Console OAuth client to
# enable the desktop "Sign in with Google" button. Without this section
# the OIDC endpoints return a clean "not configured" error and the
# desktop stays on password sign-in.
#
# [oidc.google]
# client_id = "123456789012-abcdef.apps.googleusercontent.com"
# client_secret = "GOCSPX-replace-me"
# # The full URL Google will redirect to. Must EXACTLY match an
# # Authorized Redirect URI registered in the GCP console.
# redirect_uri = "https://snipdesk.yourcompany.com/api/auth/oidc/callback"
# # Strict Workspace lock: only accept tokens whose hd claim matches.
# # Comment out for "any Google account" mode (the consent screen still
# # gates who reaches sign-in, depending on External vs Internal app
# # type in GCP).
# required_hd = "yourcompany.com"
# # Softer fallback: allow any email whose domain matches one of these.
# allowed_email_domains = ["yourcompany.com"]
