name: CI

# PR validation only. Release builds happen on the dev machine per
# docs/auto-update.md; CI just confirms the source compiles, tests pass,
# and clippy is clean before a change merges to main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel a previous run if a newer commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Node version for the JS toolchain (vite build). Keep in lockstep with
  # release.yml and rust-toolchain.toml's channel.
  NODE_VERSION: '24'
  # Run bundled JavaScript actions (rust-cache, etc.) on Node 24 instead of
  # the deprecated Node 20 runtime. GitHub force-enables this in June 2026;
  # opting in now keeps runs warning-free and forward-compatible.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Build + Lint + Test
    # Skip on pushes whose head commit is a version-bump prep: the
    # release skill produces "chore: bump <crate> to <version>" and
    # then pushes the tag, which triggers the much heavier release.yml
    # against the same SHA. Running fmt/clippy/test here too would
    # compile + check the same code twice for no signal - a Cargo.toml
    # version change can't break anything that was already green on
    # the previous main push.
    # Pull-request events always run normally; only main pushes
    # whose head commit message starts with "chore: bump" are skipped.
    if: >-
      ${{ github.event_name != 'push'
          || !startsWith(github.event.head_commit.message, 'chore: bump') }}
    # windows-latest mirrors the local build environment exactly. We're
    # Windows-only, so Linux/macOS runners would either skip Win32 syscalls
    # entirely (defeating the point) or fail to link windows-sys.
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # rust-toolchain.toml is the SINGLE source of truth for the Rust
      # version and components (clippy, rustfmt). rustup auto-installs the
      # pinned channel and its components the first time a cargo/rustc proxy
      # runs in the repo; `rustup show` triggers that explicitly so it's its
      # own fail-fast step. `component add` is an idempotent belt-and-braces
      # guard that the components exist for the *pinned* toolchain.
      #
      # We deliberately do NOT use dtolnay/rust-toolchain@stable here: paired
      # with a toml pin it installs a second (latest-stable) toolchain and
      # adds clippy/rustfmt to *that*, while cargo actually runs under the
      # toml-pinned version - so `cargo fmt`/`cargo clippy` failed on the
      # runner with "component not installed for <pinned>". That mismatch was
      # the CI breakage.
      - name: Setup Rust toolchain (from rust-toolchain.toml)
        shell: pwsh
        run: |
          rustup show
          rustup component add clippy rustfmt
          rustc --version
          cargo --version

      # Cache cargo registry and target/. ~3-5 minutes saved on warm runs.
      # rust-cache derives keys from Cargo.lock so dep bumps trigger fresh
      # downloads automatically.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Workspaces is plural because both root and src-tauri have
          # Cargo.tomls that resolve through the same lockfile.
          workspaces: |
            .
          # Don't cache full target/; it can swell to GBs. Default behavior
          # of the action keeps just the dependency artifacts.

      - name: npm ci
        run: npm ci

      - name: Build frontend (offline mode)
        run: npm run build

      # rustfmt before any build - fastest signal for "you forgot to format."
      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo check (offline)
        # Default features = offline (teams is opt-in via --features teams).
        run: cargo check --workspace --all-targets

      - name: cargo test (offline)
        run: cargo test --workspace

      - name: cargo clippy (offline)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Teams build sanity. Compile-only - full bundling takes 5+ minutes
      # and the offline build above already exercises the bulk of the code.
      - name: Build frontend (teams mode)
        run: npm run build:teams

      - name: cargo check (teams)
        run: cargo check --workspace --features teams --all-targets

      # Verify the offline-build airtightness invariant: the offline dep
      # graph contains no networking code. Fails fast if anyone slips
      # ureq or snipdesk-teams into the non-optional deps.
      - name: Verify offline guarantee
        shell: pwsh
        run: |
          $tree = cargo tree --manifest-path src-tauri/Cargo.toml
          if ($tree -match 'snipdesk-teams|ureq') {
            Write-Error "Offline dep graph contains networking code (snipdesk-teams or ureq). Move it behind the 'teams' feature."
            exit 1
          }
          Write-Host "Offline dep graph is clean."
