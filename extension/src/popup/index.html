<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnipDesk</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header><span class="title">SnipDesk</span><span id="status" class="status">Loading...</span></header>
    <main>

      <!-- Signed-out: server URL + password sign-in + token paste -->
      <section id="signed-out" class="hidden">
        <label>Server URL
          <input id="server-url" type="text" placeholder="https://snippets.example.com" autocomplete="off" spellcheck="false" />
        </label>
        <div id="password-section">
          <label>Email
            <input id="email" type="email" autocomplete="username" />
          </label>
          <label>Password
            <input id="password" type="password" autocomplete="current-password" />
          </label>
          <button id="btn-login" class="primary">Sign in</button>
        </div>
        <div id="providers"></div>
        <details>
          <summary>Sign in with SSO / paste token</summary>
          <p class="hint">Open your server's sign-in page, copy the token shown on success, and paste it here.</p>
          <input id="token" type="text" placeholder="Paste token" autocomplete="off" spellcheck="false" />
          <button id="btn-token">Use token</button>
        </details>
        <div id="error" class="error hidden"></div>
      </section>

      <!-- Signed-in: identity + sync + counts + sign out -->
      <section id="signed-in" class="hidden">
        <div class="who"><strong id="who-name"></strong><span id="who-email" class="muted"></span></div>
        <div id="counts" class="muted">No snippets synced yet.</div>
        <button id="btn-sync">Sync now</button>
        <button id="open-manager">Open manager</button>
        <button id="btn-logout" class="ghost">Sign out</button>
      </section>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
