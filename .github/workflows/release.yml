name: Release

# Triggered when you push a tag matching v* (e.g. v1.0.1, v2.0.0-rc1).
# The PR-validation workflow (ci.yml) doesn't run on tags, so this is the
# only thing that fires. Builds both flavors, signs them with the Ed25519
# key from secrets, generates manifests, publishes a GitHub release with
# all six files. Connected SnipDesk clients pick up the new version on
# their next launch poll.
#
# Prerequisites (one-time setup, see docs/auto-update.md):
#   - secrets.TAURI_SIGNING_PRIVATE_KEY: contents of ~/.snipdesk-update.key
#   - secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD: the passphrase you chose
#     when running `tauri signer generate`.
#   - tauri.conf.json's plugins.updater.pubkey filled in with the
#     contents of ~/.snipdesk-update.key.pub.
on:
  push:
    tags: ['v*']

# Required so softprops/action-gh-release can create the GitHub release.
permissions:
  contents: write

env:
  # Run bundled JavaScript actions (action-gh-release, rust-cache) on Node 24
  # instead of the deprecated Node 20 runtime. GitHub force-enables this in
  # June 2026; opting in now keeps runs warning-free and forward-compatible.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build, sign, publish
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      # rust-toolchain.toml is the single source of truth for the Rust
      # version + components; rustup auto-installs the pinned channel on
      # first use. `rustup show` triggers it as a fail-fast step. (No
      # dtolnay action: pairing it with a toml pin installs a conflicting
      # second toolchain - see ci.yml for the full rationale.)
      - name: Setup Rust toolchain (from rust-toolchain.toml)
        shell: pwsh
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          # Tag is "v1.0.1"; we want "1.0.1" for the manifest version field
          # and the release title.
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing version $version"

      - name: npm ci
        run: npm ci

      # ---- Offline build ----
      - name: Build offline frontend
        run: npm run build

      - name: Build offline NSIS bundle (signed)
        # Tauri's signer reads these env vars and produces .sig files
        # alongside the installers automatically. No separate signing step.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx @tauri-apps/cli build --bundles nsis

      # Normalize the Lite installer to a stable, version-less name (the Teams
      # build does its own rename in build-teams.mjs). Must run before the
      # Teams build so the two installers never collide in the nsis dir.
      - name: Normalize offline (Lite) installer name
        shell: pwsh
        run: |
          # Workspace target lives at the repo root, not under src-tauri/.
          $nsis = "target\release\bundle\nsis"
          $exe = Get-ChildItem $nsis -Filter "SnipDesk Lite_*_x64-setup.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "Offline NSIS installer not found in $nsis"; exit 1 }
          if (Test-Path "$($exe.FullName).sig") {
            Rename-Item "$($exe.FullName).sig" "SnipDesk-Lite-setup.exe.sig"
          }
          Rename-Item $exe.FullName "SnipDesk-Lite-setup.exe"
          Write-Host "Renamed $($exe.Name) -> SnipDesk-Lite-setup.exe"

      # ---- Teams build ----
      - name: Build Teams flavor (signed)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build:teams -- --bundles nsis

      # ---- Vanilla manifest generation ----
      - name: Generate vanilla update manifests
        shell: pwsh
        run: |
          .\scripts\generate-manifest.ps1 `
            -Version "${{ steps.version.outputs.VERSION }}" `
            -Notes "Release ${{ steps.version.outputs.VERSION }}. See commit history for changes."

      # ---- Whitelabel build (optional) ----
      # When secrets.BRAND_CONFIG_WHITELABEL is set, build a second
      # pair of installers + manifests with the customer's brand
      # overrides applied via scripts/brand.mjs. The customer's
      # binary embeds its own updater_url pointing at the
      # whitelabel manifest file in this same release - so one
      # tag push services every audience and there's no extra
      # hosting required.
      - name: Resolve whitelabel inputs
        id: wl
        shell: pwsh
        env:
          BRAND_CONFIG_VALUE: ${{ secrets.BRAND_CONFIG_WHITELABEL }}
        run: |
          $raw = $env:BRAND_CONFIG_VALUE
          if (-not $raw) {
            Write-Host "No BRAND_CONFIG_WHITELABEL secret; skipping whitelabel build."
            "configured=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
          try { $cfg = $raw | ConvertFrom-Json -ErrorAction Stop }
          catch { Write-Error "BRAND_CONFIG_WHITELABEL is not valid JSON: $_"; exit 1 }
          foreach ($key in 'name','identifier','teams_identifier') {
            if (-not $cfg.$key) { Write-Error "BRAND_CONFIG_WHITELABEL missing required field: $key"; exit 1 }
          }
          $tmp = Join-Path $env:RUNNER_TEMP "brand.json"
          Set-Content -Path $tmp -Value $raw -Encoding UTF8
          # PascalCase ASCII prefix for installer filenames; defaults
          # to name with non-alphanumerics stripped. Customers can
          # set "slug" explicitly for a shorter or different prefix.
          $installerPrefix = if ($cfg.slug) { $cfg.slug } else { ($cfg.name -replace '[^A-Za-z0-9]','') }
          # kebab-case prefix for the manifest filenames; always
          # rooted at "snipdesk-" so vanilla and whitelabel coexist
          # cleanly in releases/latest/download/.
          $slugLower = if ($cfg.slug) { $cfg.slug.ToLower() } else { ($cfg.name -replace '[^A-Za-z0-9]','').ToLower() }
          "configured=true" >> $env:GITHUB_OUTPUT
          "config_path=$tmp" >> $env:GITHUB_OUTPUT
          "product_name=$($cfg.name)" >> $env:GITHUB_OUTPUT
          "installer_prefix=$installerPrefix" >> $env:GITHUB_OUTPUT
          "manifest_prefix=snipdesk-$slugLower" >> $env:GITHUB_OUTPUT
          Write-Host "Whitelabel configured: $($cfg.name) -> installer prefix '$installerPrefix', manifest prefix 'snipdesk-$slugLower'"

      - name: Build whitelabel Lite (signed)
        if: steps.wl.outputs.configured == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          BRAND_CONFIG: ${{ steps.wl.outputs.config_path }}
        run: npm run tauri:build -- --bundles nsis

      - name: Normalize whitelabel Lite installer name
        if: steps.wl.outputs.configured == 'true'
        shell: pwsh
        env:
          PRODUCT_NAME: ${{ steps.wl.outputs.product_name }}
          INSTALLER_PREFIX: ${{ steps.wl.outputs.installer_prefix }}
        run: |
          $nsis = "target\release\bundle\nsis"
          $filter = "$($env:PRODUCT_NAME) Lite_*_x64-setup.exe"
          $exe = Get-ChildItem $nsis -Filter $filter | Select-Object -First 1
          if (-not $exe) { Write-Error "Whitelabel Lite NSIS installer not found (filter: $filter)"; exit 1 }
          $target = "$($env:INSTALLER_PREFIX)-Lite-setup.exe"
          if (Test-Path "$($exe.FullName).sig") {
            Rename-Item "$($exe.FullName).sig" "$target.sig"
          }
          Rename-Item $exe.FullName $target
          Write-Host "Renamed $($exe.Name) -> $target"

      - name: Build whitelabel Teams (signed)
        if: steps.wl.outputs.configured == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          BRAND_CONFIG: ${{ steps.wl.outputs.config_path }}
        run: npm run tauri:build:teams -- --bundles nsis

      - name: Generate whitelabel update manifests
        if: steps.wl.outputs.configured == 'true'
        shell: pwsh
        run: |
          .\scripts\generate-manifest.ps1 `
            -Version "${{ steps.version.outputs.VERSION }}" `
            -Notes "Release ${{ steps.version.outputs.VERSION }}. See commit history for changes." `
            -InstallerPrefix "${{ steps.wl.outputs.installer_prefix }}" `
            -ManifestPrefix "${{ steps.wl.outputs.manifest_prefix }}"

      # ---- Sanity check before publishing ----
      - name: Verify all release artifacts exist
        shell: pwsh
        env:
          WL_CONFIGURED: ${{ steps.wl.outputs.configured }}
          WL_INSTALLER_PREFIX: ${{ steps.wl.outputs.installer_prefix }}
          WL_MANIFEST_PREFIX: ${{ steps.wl.outputs.manifest_prefix }}
        run: |
          $expected = @(
            "target\release\bundle\nsis\SnipDesk-Lite-setup.exe",
            "target\release\bundle\nsis\SnipDesk-Lite-setup.exe.sig",
            "target\release\bundle\nsis\SnipDesk-Teams-setup.exe",
            "target\release\bundle\nsis\SnipDesk-Teams-setup.exe.sig",
            "snipdesk-update.json",
            "snipdesk-teams-update.json"
          )
          if ($env:WL_CONFIGURED -eq 'true') {
            $expected += @(
              "target\release\bundle\nsis\$($env:WL_INSTALLER_PREFIX)-Lite-setup.exe",
              "target\release\bundle\nsis\$($env:WL_INSTALLER_PREFIX)-Lite-setup.exe.sig",
              "target\release\bundle\nsis\$($env:WL_INSTALLER_PREFIX)-Teams-setup.exe",
              "target\release\bundle\nsis\$($env:WL_INSTALLER_PREFIX)-Teams-setup.exe.sig",
              "$($env:WL_MANIFEST_PREFIX)-update.json",
              "$($env:WL_MANIFEST_PREFIX)-teams-update.json"
            )
          }
          $missing = $expected | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Error "Missing release artifacts: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All $($expected.Count) artifacts present."

      # ---- Build the release-files list ----
      # softprops/action-gh-release reads its `files:` input as a
      # newline-separated string; we assemble it here so the
      # whitelabel rows only appear when the build actually ran.
      - name: Compose release file list
        id: files
        shell: pwsh
        env:
          WL_CONFIGURED: ${{ steps.wl.outputs.configured }}
          WL_INSTALLER_PREFIX: ${{ steps.wl.outputs.installer_prefix }}
          WL_MANIFEST_PREFIX: ${{ steps.wl.outputs.manifest_prefix }}
        run: |
          $lines = @(
            "target/release/bundle/nsis/SnipDesk-Lite-setup.exe",
            "target/release/bundle/nsis/SnipDesk-Lite-setup.exe.sig",
            "target/release/bundle/nsis/SnipDesk-Teams-setup.exe",
            "target/release/bundle/nsis/SnipDesk-Teams-setup.exe.sig",
            "snipdesk-update.json",
            "snipdesk-teams-update.json"
          )
          if ($env:WL_CONFIGURED -eq 'true') {
            $lines += @(
              "target/release/bundle/nsis/$($env:WL_INSTALLER_PREFIX)-Lite-setup.exe",
              "target/release/bundle/nsis/$($env:WL_INSTALLER_PREFIX)-Lite-setup.exe.sig",
              "target/release/bundle/nsis/$($env:WL_INSTALLER_PREFIX)-Teams-setup.exe",
              "target/release/bundle/nsis/$($env:WL_INSTALLER_PREFIX)-Teams-setup.exe.sig",
              "$($env:WL_MANIFEST_PREFIX)-update.json",
              "$($env:WL_MANIFEST_PREFIX)-teams-update.json"
            )
          }
          # Multi-line output via the GHA heredoc syntax.
          $out = "files<<EOF`n" + ($lines -join "`n") + "`nEOF"
          $out >> $env:GITHUB_OUTPUT

      # ---- Publish release ----
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SnipDesk ${{ steps.version.outputs.VERSION }}
          # Auto-generates from PRs/commits since previous tag.
          generate_release_notes: true
          # Default is to mark this as Latest; the updater's URL pattern
          # (releases/latest/download/...) follows that redirect, so this
          # is what makes connected clients pick up the new version.
          make_latest: 'true'
          fail_on_unmatched_files: true
          files: ${{ steps.files.outputs.files }}
