<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnipDesk</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header><span class="title">SnipDesk</span><span id="status" class="status">Loading...</span></header>
    <main>

      <!-- Signed-in identity sits at the top, under the header. Toggled
           alongside #signed-in by refresh(). -->
      <section id="identity" class="hidden">
        <div class="who-id"><strong id="who-name"></strong><span id="who-email" class="muted"></span></div>
        <div id="sync-status" class="muted"></div>
      </section>

      <!-- Always available: local snippets work without an account -->
      <section id="core">
        <div class="who">
          <div id="counts" class="muted">No snippets yet.</div>
          <div id="popup-savings" class="savings"></div>
        </div>
        <button id="btn-launch" class="primary">Launch here</button>
        <button id="open-manager">Open manager</button>
      </section>

      <!-- Signed-in account actions; identity moved to #identity up top. -->
      <section id="signed-in" class="hidden">
        <button id="btn-sync">Sync now</button>
        <button id="btn-logout" class="ghost">Sign out</button>
      </section>

      <!-- Signed-out: optional sign-in for team library + cross-device sync -->
      <section id="signed-out" class="hidden">
        <p class="hint">Personal snippets work offline without an account. Sign in to a SnipDesk server for the team library and cross-device sync.</p>
        <label>Server URL
          <input id="server-url" type="text" placeholder="https://snippets.example.com" autocomplete="off" spellcheck="false" />
        </label>
        <!-- Sign-in options stay hidden until the server is reachable and
             reports its methods (see loadMethods); an unreachable or
             empty server URL shows nothing. -->
        <div id="auth-options" class="hidden">
          <div id="password-section">
            <label>Email
              <input id="email" type="email" autocomplete="username" />
            </label>
            <label>Password
              <input id="password" type="password" autocomplete="current-password" />
            </label>
            <button id="btn-login" class="primary">Sign in</button>
          </div>
          <div id="providers"></div>
          <!-- Token paste, shown only when the server offers SSO. A plain
               button + section (not <details>) so opening it grows the
               popup instead of making it scroll. -->
          <div id="sso-token" class="hidden">
            <button id="toggle-token" type="button" class="token-toggle">Sign in with SSO / paste token</button>
            <div id="token-section" class="hidden">
              <p class="hint">Open your server's sign-in page, copy the token shown on success, and paste it here.</p>
              <input id="token" type="text" placeholder="Paste token" autocomplete="off" spellcheck="false" />
              <button id="btn-token">Use token</button>
            </div>
          </div>
        </div>
        <div id="error" class="error hidden"></div>
      </section>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
